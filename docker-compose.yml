services:
  status-server:
    build: ./backend
    container_name: status-server
    restart: unless-stopped
    networks:
      - mariadb_mariadb
      - caddy
      - n8n
      - esper-push_default
      - esper-update_esper-net
    ports:
      - "3000:3000"
    volumes:
      - ./servers.json:/config/servers.json
    environment:
      - PORT=3000
      - CHECK_INTERVAL=30000
      - CONFIG_PATH=/config/servers.json
      # Database (uses your existing MariaDB container)
      - DB_HOST=mariadb
      - DB_PORT=3306
      - DB_USER=statusadmin
      - DB_PASSWORD=Tj1R*xabwKFC@yPe
      - DB_NAME=status_monitor
      # Session secret - change this to a random string
      - SESSION_SECRET=UJhBM9MrxSBBWQn3
      # Default admin credentials (only used on first run to create the user)
      - ADMIN_USERNAME=admin
      - ADMIN_PASSWORD=Kt5ultra!!
    cap_add:
      - NET_RAW
    labels:
      - "com.status-server.description=Self-hosted status monitor"

networks:
  mariadb_mariadb:
    external: true
  caddy:
    external: true
  esper-push_default:
    external: true
  esper-update_esper-net:
    external: true
  n8n:
    external: true