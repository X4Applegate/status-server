services:
  status-server:
    build: ./backend
    container_name: status-server
    restart: unless-stopped
    networks:
      - mariadb_mariadb   # your existing MariaDB network
      - caddy             # your reverse-proxy network
    ports:
      - "3000:3000"
    environment:
      - PORT=3000
      - CHECK_INTERVAL=30000

      # MariaDB connection — point at your existing MariaDB container or host
      - DB_HOST=mariadb
      - DB_PORT=3306
      - DB_USER=statusadmin
      - DB_PASSWORD=CHANGE_ME
      - DB_NAME=status_monitor

      # Session signing secret — generate a long random string
      - SESSION_SECRET=CHANGE_ME_TO_A_RANDOM_STRING

      # Fallback URL for dashboard links in webhook alerts (optional)
      # - EXTERNAL_URL=https://uptime.example.com

      # Container timezone (optional — defaults to UTC)
      - TZ=America/Los_Angeles

      # Branding for legal pages and update notifications (optional)
      - APP_OWNER=Your Name
      - APP_CONTACT_EMAIL=you@example.com
      - APP_HOME_URL=/

    # NET_RAW is required for ICMP ping checks
    cap_add:
      - NET_RAW

    labels:
      - "com.status-server.description=Self-hosted status monitor"

networks:
  mariadb_mariadb:
    external: true
  caddy:
    external: true
