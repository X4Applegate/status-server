services:
  status-server:
    image: applegater/status-server:latest
    container_name: status-server
    restart: unless-stopped
    ports:
      # Standalone install — binds publicly on 3000.
      - "3000:3000"
      # ── HA primary / behind Cloudflare Tunnel? ──────────────────────────────
      # Comment the line above and uncomment this one to bind loopback-only.
      # Pair with the matching Cloudflare Tunnel `service: http://localhost:3200`
      # and keep this box's status-server off the public internet.
      # - "127.0.0.1:3200:3000"
    volumes:
      - ./servers.json:/config/servers.json
    environment:
      - PORT=3000
      - CHECK_INTERVAL=30000
      - CONFIG_PATH=/config/servers.json

      # Database — points at the mariadb service below
      - DB_HOST=mariadb
      - DB_PORT=3306
      - DB_USER=statusadmin
      - DB_PASSWORD=changeme
      - DB_NAME=status_monitor

      # Session signing secret — change to a long random string.
      # In an HA pair, this MUST be identical on both primary and replica so
      # logged-in sessions survive a failover.
      - SESSION_SECRET=changeme_use_a_long_random_string

      # Base URL used for dashboard links in webhook alerts
      - EXTERNAL_URL=https://status.yourdomain.com

      # Container timezone
      - TZ=America/Los_Angeles

      # SMTP for email notifications (optional)
      # - SMTP_HOST=smtp.gmail.com
      # - SMTP_PORT=587
      # - SMTP_USER=you@gmail.com
      # - SMTP_PASS=your-app-password
      # - SMTP_FROM=monitor@yourdomain.com
      # - SMTP_SECURE=false

      # Branding (optional)
      # - APP_OWNER=Your Name
      # - APP_CONTACT_EMAIL=you@example.com
      # - APP_HOME_URL=/

    # Required for ICMP ping checks
    cap_add:
      - NET_RAW
    depends_on:
      - mariadb
    labels:
      - "com.status-server.description=Self-hosted status monitor"

  mariadb:
    image: mariadb:11
    container_name: mariadb
    restart: unless-stopped
    # ── Standalone install ────────────────────────────────────────────────────
    # The default mariadb image is fine as-is for a single-box deployment.
    #
    # ── HA PRIMARY? Uncomment the `command:` block below. ─────────────────────
    # Required if this box will replicate to a standby replica
    # (see docker-compose.replica.example.yml + docs/HIGH_AVAILABILITY.md).
    # Without these flags the replica has no binlog to follow.
    #
    # command:
    #   - --server-id=1                          # MUST be unique; replica uses 2
    #   - --log-bin=mysql-bin                    # enables binary logging for replication
    #   - --binlog-format=ROW
    #   - --binlog-row-image=MINIMAL
    #   - --expire-logs-days=7
    #   - --log-slave-updates=1                  # needed for failback / chained replication
    #   - --relay-log=relay-bin
    #   - --max_allowed_packet=1G
    #   - --slave-max-allowed-packet=1G          # must match replica's slave-max-allowed-packet
    #   # If this MariaDB instance hosts OTHER databases besides status_monitor
    #   # (e.g. shared with Nextcloud, Cloudron apps, etc.), uncomment to avoid
    #   # replicating them to the standby:
    #   # - --replicate-wild-do-table=status_monitor.%
    environment:
      - MYSQL_ROOT_PASSWORD=rootpassword
      - MYSQL_DATABASE=status_monitor
      - MYSQL_USER=statusadmin
      - MYSQL_PASSWORD=changeme
    volumes:
      - mariadb_data:/var/lib/mysql
    # ── HA PRIMARY? Expose 3306 to the replica. ───────────────────────────────
    # The standby must be able to reach this box on 3306 to pull binlog events.
    # Uncomment the ports block AND firewall it to the replica's IP only:
    #   sudo ufw allow from <REPLICA_IP> to any port 3306 proto tcp
    #   sudo ufw deny  3306
    #
    # ports:
    #   - "3306:3306"

volumes:
  mariadb_data:
