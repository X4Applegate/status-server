# docker-compose for the REPLICA host.
#
# Deploy this on your second box (e.g. 50.191.208.171).
# See docs/HIGH_AVAILABILITY.md for the full setup procedure.
#
# Differences from the Primary compose file:
#   - mariadb has --server-id=2 and --read-only=1 (don't accept writes until promoted)
#   - status-server is present but commented out by default — leave it off until
#     you promote this node. Enables zero-risk "warm standby" mode.

services:
  status-server:
    image: applegater/status-server:latest
    container_name: status-server
    restart: unless-stopped
    # IMPORTANT: leave this service stopped (scale=0 or `docker compose stop status-server`)
    # until you've run scripts/promote-replica.sh. Running status-server against a
    # read-only DB will generate constant write errors.
    profiles: ["promoted"]   # only starts when you `docker compose --profile promoted up`
    ports:
      # Loopback-only. Traffic reaches this container via cloudflared's tunnel
      # connector (`service: http://localhost:3200` in ~/.cloudflared/config.yml),
      # NOT from the public internet. Binding to 127.0.0.1 means a misconfigured
      # firewall or a dead tunnel can never expose the app raw.
      #
      # Why 3200 instead of 3000? 3000 collides with Cloudron (and a bunch of
      # other self-hosted apps — Grafana, Next.js, Gitea, etc.). If you're on a
      # bare host with nothing else on 3000 you can use "127.0.0.1:3000:3000".
      # If you DO use 3200, your Cloudflare Tunnel service URL on BOTH boxes
      # must be http://localhost:3200 — see docs/HIGH_AVAILABILITY.md.
      - "127.0.0.1:3200:3000"
    volumes:
      - ./servers.json:/config/servers.json
    environment:
      - PORT=3000
      - CHECK_INTERVAL=30000
      - CONFIG_PATH=/config/servers.json
      - DB_HOST=mariadb
      - DB_PORT=3306
      - DB_USER=statusadmin
      - DB_PASSWORD=CHANGE_ME_SAME_AS_PRIMARY
      - DB_NAME=status_monitor
      # SESSION_SECRET must match Primary so sessions survive a failover
      - SESSION_SECRET=CHANGE_ME_SAME_AS_PRIMARY
      - EXTERNAL_URL=https://uptime.richardapplegate.io
      - TZ=America/Los_Angeles
    cap_add:
      - NET_RAW
    depends_on:
      - mariadb

  mariadb:
    image: mariadb:11
    container_name: mariadb
    restart: unless-stopped
    command:
      - --server-id=2                          # MUST be different from Primary (which is 1)
      - --log-bin=mysql-bin                    # so this node can itself become Primary after failover
      - --binlog-format=ROW
      - --expire-logs-days=7
      - --binlog-row-image=MINIMAL
      - --read-only=1                          # Replica is read-only until promoted
      - --log-slave-updates=1                  # needed for chained replication / failback
      - --relay-log=relay-bin
      - --skip-slave-start=0                   # auto-start replication on container restart
      - --max_allowed_packet=1G                # prevent 1236 errors on large binlog events
      - --slave-max-allowed-packet=1G          # must match Primary's max_allowed_packet
      # If Primary hosts databases OTHER than status_monitor (e.g., another app on the
      # same MariaDB instance), uncomment the next line so this Replica only applies
      # status_monitor events. Without it you will hit "Table 'other_db.xxx' doesn't
      # exist" (error 1146) and SQL thread will stop.
      # - --replicate-wild-do-table=status_monitor.%
    environment:
      - MYSQL_ROOT_PASSWORD=CHANGE_ME_ROOT_PASSWORD
      - MYSQL_DATABASE=status_monitor
      - MYSQL_USER=statusadmin
      - MYSQL_PASSWORD=CHANGE_ME_SAME_AS_PRIMARY
    volumes:
      - mariadb_data:/var/lib/mysql
    # Do NOT expose 3306 to the PUBLIC internet. Replica only needs to reach
    # OUT to Primary's 3306 — nothing needs to come in to this box's 3306
    # during normal Replica operation.
    #
    # HOWEVER — when THIS box gets promoted and the OLD primary eventually
    # comes back online as the NEW replica, that old box needs to connect
    # inbound to 3306 on this one. At that point you'll uncomment:
    #
    # ports:
    #   - "3306:3306"     # if no other mariadb is on the host
    #   # - "3307:3306"   # if Cloudron or another mariadb already owns 3306
    #
    # and firewall it to the other box's IP only:
    #   sudo ufw allow from <OTHER_BOX_IP> to any port 3306 proto tcp
    #   sudo ufw deny  3306
    #
    # If you use port 3307 instead of 3306, the failback CHANGE MASTER TO
    # must include MASTER_PORT=3307.

volumes:
  mariadb_data:
